# Physical Manifest Example
# Defines the physical backends (data sources) for ADP curation
version: "1.0.0"

backends:
  # RDBMS Backend - PostgreSQL database
  - id: "finance_sql_pg"
    type: "RDBMS"
    provider: "postgresql"
    config:
      type: "RDBMS"
      uri: "postgresql://db.acme.com:5432/finance"
      schema: "public"
    credentials:
      type: "env"
      key: "DB_PASSWORD"

  # RDBMS Backend - MySQL database (same type, different provider)
  - id: "finance_sql_mysql"
    type: "RDBMS"
    provider: "mysql"
    config:
      type: "RDBMS"
      uri: "mysql://db.acme.com:3306/finance"
    credentials:
      type: "env"
      key: "MYSQL_DB_PASSWORD"

  # Vector Database Backend - Pinecone (provider distinguishes from Weaviate, etc.)
  - id: "report_vectors"
    type: "VECTOR"
    provider: "pinecone"
    config:
      type: "VECTOR"
      indexName: "bank-summaries"
      endpoint: "https://api.pinecone.io"
    credentials:
      type: "secret"
      manager: "AWS_SECRETS_MANAGER"
      key: "production/pinecone-api-key"

  # Blob Storage Backend - AWS S3 (provider distinguishes S3 from GCS, etc.)
  - id: "raw_storage"
    type: "BLOB_STORAGE"
    provider: "s3"
    config:
      type: "BLOB_STORAGE"
      uri: "s3://acme-finance-datalake/"
      region: "us-east-1"
    credentials:
      type: "secret"
      manager: "AWS_SECRETS_MANAGER"
      key: "production/s3-credentials"

  # Blob Storage Backend - local file system
  - id: "local_files"
    type: "BLOB_STORAGE"
    provider: "local"
    config:
      type: "BLOB_STORAGE"
      uri: "/data/warehouse"

  # NoSQL Backend - MongoDB (provider distinguishes from DynamoDB, etc.)
  - id: "analytics_nosql"
    type: "NOSQL"
    provider: "mongodb"
    config:
      type: "NOSQL"
      uri: "mongodb://mongo.acme.com:27017/analytics"
    credentials:
      type: "env"
      key: "MONGO_PASSWORD"

  # Graph Database Backend - Neo4j (provider distinguishes from other graph backends)
  - id: "graph_db"
    type: "GRAPH"
    provider: "neo4j"
    config:
      type: "GRAPH"
      uri: "neo4j://graph.acme.com:7687"
    credentials:
      type: "file"
      key: "/etc/secrets/neo4j-credentials.json"
