# Policy Manifest Example
# Defines governance policies (rules) for resource access.
# Each policy specifies its own scope: resourceId for MANDATORY_FILTER and
# OPERATIONAL (exact resource only), resourceSelector for ACCESS (exact or wildcard).
# Resource selectors follow the same namespace/name structure as ResourceId, but
# with a very simple wildcard rule: `*` may appear only once and only as the last
# token. Supported forms:
#   - Exact: "namespace:name"                (no `*`)
#   - All names in one namespace: "ns:*"     (e.g. "com.acme.finance:*")
#   - Namespace prefix: "ns.*" or "ns.sub.*" (e.g. "com.acme.*", "com.acme.finance.*")
# Forms like "a*", "a.b*", "com.acme.*:name", or "com.acme.*:*" are not supported.
#

# ============================================================================
# Bootstrap Mode - No Enforcements
# ============================================================================
# Uncomment the following for bootstrap mode (no restrictions):
# version: "1.0.0"
# # No policies array needed - no special enforcements will be applied
# # All resources are accessible without restrictions

# ============================================================================
# Full Manual Definition with Policies
# ============================================================================
version: "1.0.0"

policies:
  # --- com.acme.finance:bank_failures ---
  - type: "ACCESS"
    resourceSelector: "com.acme.finance:bank_failures"
    roles:
      - role: admin
        allowedIntents: [LOOKUP, QUERY, REVISE, INGEST]
      - role: user
        allowedIntents: [LOOKUP, QUERY]

  - type: "MANDATORY_FILTER"
    resourceId: "com.acme.finance:bank_failures"
    fieldId: "closing_date"
    op: "GT"
    value: "2020-01-01"
    condition: "agent_tier == 'PRODUCTION'"

  - type: "OPERATIONAL"
    resourceId: "com.acme.finance:bank_failures"
    enforceLimit: 100
    defaultOrderBy:
      fieldId: "closing_date"
      direction: "DESC"

  # --- com.acme.finance:failure_vectors ---
  - type: "OPERATIONAL"
    resourceId: "com.acme.finance:failure_vectors"
    enforceLimit: 50
    defaultOrderBy:
      fieldId: "bank_id"
      direction: "ASC"

  # --- com.acme.finance:reports ---
  - type: "MANDATORY_FILTER"
    resourceId: "com.acme.finance:reports"
    fieldId: "report_date"
    op: "GTE"
    value: "2024-01-01"

  - type: "OPERATIONAL"
    resourceId: "com.acme.finance:reports"
    enforceLimit: 200

  # --- ACCESS with wildcard: all resources under com.acme (any sub-namespace) ---
  # "com.acme.*" is a namespace-prefix selector that matches any resource whose
  # namespace starts with "com.acme." (e.g. "com.acme.finance:bank_failures").
  # More specific child-namespace or exact-resource policies override broader ones.
  - type: "ACCESS"
    resourceSelector: "com.acme.*"
    roles:
      - role: superuser
        allowedIntents: ["*"]
      - role: viewer
        allowedIntents: [LOOKUP, QUERY]

  # --- com.acme.finance:audit_log (read-only: LOOKUP and QUERY only) ---
  - type: "ACCESS"
    resourceSelector: "com.acme.finance:audit_log"
    roles:
      - role: admin
        allowedIntents: [LOOKUP, QUERY]
      - role: auditor
        allowedIntents: [LOOKUP, QUERY]

  - type: "OPERATIONAL"
    resourceId: "com.acme.finance:audit_log"
    enforceLimit: 500
    defaultOrderBy:
      fieldId: "event_time"
      direction: "DESC"

  # --- com.acme.sales:transactions (mandatory filter only) ---
  - type: "MANDATORY_FILTER"
    resourceId: "com.acme.sales:transactions"
    fieldId: "region"
    op: "IN"
    value: ["US", "EU"]

  # --- com.acme.finance:sensitive_views (multiple policy types) ---
  - type: "ACCESS"
    resourceSelector: "com.acme.finance:sensitive_views"
    roles:
      - role: compliance
        allowedIntents: [LOOKUP, QUERY, REVISE]
      - role: analyst
        allowedIntents: [LOOKUP, QUERY]

  - type: "MANDATORY_FILTER"
    resourceId: "com.acme.finance:sensitive_views"
    fieldId: "data_classification"
    op: "NEQ"
    value: "internal_only"

  - type: "OPERATIONAL"
    resourceId: "com.acme.finance:sensitive_views"
    enforceLimit: 100