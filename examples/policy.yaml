# Policy Manifest Example
# Defines governance rules and constraints for resource access
#

# ============================================================================
# Bootstrap Mode - No Enforcements
# ============================================================================
# Uncomment the following for bootstrap mode (no restrictions):
# version: "1.0.0"
# # No policies array needed - no special enforcements will be applied
# # All resources are accessible without restrictions

# ============================================================================
# Full Manual Definition with Policy Rules
# ============================================================================
version: "1.0.0"

policies:
  # Policy for single-source resource - source field can be omitted
  - resourceSelector: "com.acme.finance:bank_failures"
    rules:
      # RBAC access control: which roles can use which intents
      - type: "ACCESS"
        roles:
          - role: admin
            allowedIntents: [LOOKUP, QUERY, REVISE, INGEST]
          - role: user
            allowedIntents: [LOOKUP, QUERY]

      # Mandatory filter: enforce data freshness
      # source omitted - OK because resource has only one source (current limitation)
      - type: "MANDATORY_FILTER"
        fieldId: "closing_date"
        op: "GT"
        value: "2020-01-01"
        condition: "agent_tier == 'PRODUCTION'"

      # Operational constraint: limit results and default sorting
      # source omitted in defaultOrderBy - OK because resource has only one source
      - type: "OPERATIONAL"
        enforceLimit: 100
        defaultOrderBy:
          fieldId: "closing_date"
          direction: "DESC"

  # Policy for vector search resource
  - resourceSelector: "com.acme.finance:failure_vectors"
    rules:
      - type: "OPERATIONAL"
        enforceLimit: 50
        defaultOrderBy:
          fieldId: "bank_id"
          direction: "ASC"

  # Policy for reports resource
  - resourceSelector: "com.acme.finance:reports"
    rules:
      # Mandatory filter: only show reports from last 2 years
      - type: "MANDATORY_FILTER"
        fieldId: "report_date"
        op: "GTE"
        value: "2024-01-01"

      # Operational constraint: limit to 200 results
      - type: "OPERATIONAL"
        enforceLimit: 200

  # Policy using wildcards (resource selector supports wildcards in name "com.acme.finance:*"
  # or namespace "com.acme.*")
  - resourceSelector: "com.acme.finance:*"
    rules:
      # Apply limit to all finance resources for basic tier
      - type: "OPERATIONAL"
        enforceLimit: 50
        condition: "agent_tier == 'BASIC'"

      # More permissive for production tier
      - type: "OPERATIONAL"
        enforceLimit: 1000
        condition: "agent_tier == 'PRODUCTION'"

  # Namespace wildcard: applies to all resources under com.acme (any sub-namespace).
  # More specific child-namespace or exact-resource rules (e.g. com.acme.finance:*)
  # SHOULD be treated as overriding or refining this broader rule.
  - resourceSelector: "com.acme.*"
    rules:
      - type: "ACCESS"
        roles:
          - role: superuser
            allowedIntents: ["*"]   # All intents
          - role: viewer
            allowedIntents: [LOOKUP, QUERY]

  # Read-only resource: only LOOKUP and QUERY allowed for all roles
  - resourceSelector: "com.acme.finance:audit_log"
    rules:
      - type: "ACCESS"
        roles:
          - role: admin
            allowedIntents: [LOOKUP, QUERY]
          - role: auditor
            allowedIntents: [LOOKUP, QUERY]
      - type: "OPERATIONAL"
        enforceLimit: 500
        defaultOrderBy:
          fieldId: "event_time"
          direction: "DESC"

  # Mandatory filter only: restrict by region (no operational or access rules)
  - resourceSelector: "com.acme.sales:transactions"
    rules:
      - type: "MANDATORY_FILTER"
        fieldId: "region"
        op: "IN"
        value: ["US", "EU"]

  # Multiple rule types for a sensitive resource
  - resourceSelector: "com.acme.finance:sensitive_views"
    rules:
      - type: "ACCESS"
        roles:
          - role: compliance
            allowedIntents: [LOOKUP, QUERY, REVISE]
          - role: analyst
            allowedIntents: [LOOKUP, QUERY]
      - type: "MANDATORY_FILTER"
        fieldId: "data_classification"
        op: "NEQ"
        value: "internal_only"
      - type: "OPERATIONAL"
        enforceLimit: 100

# ============================================================================
# Minimal Policy Example
# ============================================================================
# You can also define minimal policies:
# version: "1.0.0"
# policies:
#   - resourceSelector: "com.acme.finance:bank_failures"
#     # Empty rules array = no enforcements for this resource
#     rules: []
