# Semantic Manifest - Bootstrap Mode Example
# Simplest setup: Just specify the domain, everything else is auto-discovered

version: "1.0.0"
defaultDomain: "com.acme.finance"

# No resources array needed!
# The system will:
# 1. Read all backends from physical.yaml
# 2. For each backend, discover all sources:
#    - RDBMS: all tables and views
#    - Vector: all collections/indexes
#    - S3: all prefixes (or use root if no prefix specified)
#    - NoSQL: all collections/namespaces
#    - Graph: all node labels
# 3. Create a resource for each discovered source
# 4. Auto-generate resourceIds as "{defaultDomain}:{source}" (sanitized)
# 5. Auto-discover fields from backend schema
# 6. Apply defaults:
#    - intentClasses omitted = defaults to ["*"] (wildcard, accepts any intent class: QUERY, LOOKUP, INGEST, REVISE)
#    - version=1 (resource version number; default 1 if omitted)
#    - description auto-generated from source name
