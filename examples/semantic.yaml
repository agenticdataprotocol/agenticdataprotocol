#       - source: "v_failures_consolidated"
#         # fields will be auto-discovered from table schema
#     # resourceId will be auto-generated as "com.acme.finance:v_failures_consolidated"
#     # intentClasses omitted = defaults to ["*"] (wildcard, accepts any intent class: QUERY, LOOKUP, INGEST, REVISE, SYNTHESIZE)
#     # version omitted = defaults to 1 (version numbers start from 1)
#
#   # Full manual definition with single source (current limitation)
#   - resourceId: "com.acme.finance:custom_view"
#     backendId: "finance_sql"
#     sources:
#       - source: "custom_analytics_view"
#         fields:
#           - fieldId: "custom_field"
#             type: "STRING"
#             description: "Custom field definition"
#   # Note: Currently only one source per resource is supported.
#   # For multiple sources, create separate resources.
